# This workflow will install Python dependencies
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Backup automation

on:
  schedule:
    - cron: '55 5 * * *'
  workflow_dispatch: 

jobs:
  cron-job:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13.2
      uses: actions/setup-python@v5
      with:
        python-version: "3.13.2"
    
    - name: Setup PostgreSQL
      uses: tj-actions/install-postgresql@v3
      with:
          postgresql-version: 17

    - name: Backup database
      env: 
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: 
        pg_dump $DATABASE_URL > backup.sql
        
    - name: Compress backup
      run:  
        gzip backup.sql

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: postgres backup
        path: backup.sql.gz
    - name: Upload to Google Drive
      id: upload-backup
      uses: muhabal/Upload_Github_Artifacts_TO_GDrive@v2.3.4
      with:
        target: backup.sql.gz
        credentials: ${{ secrets.TJT_GOOGLE_CREDENTIALS }}
        parent_folder_id: ${{ secrets.GOOGLE_TJT_BACKUP_PARENT_FOLDER_ID }}
    - name: Show single file upload results
      run: |
        echo "Single file upload results"
        echo "View File Name: ${{ steps.upload-backup.outputs.file_name }}"
        echo "Web View Link: ${{ steps.upload-backup.outputs.web_view_link }}"
  release-project:
    name: Download backup
    runs-on: ubuntu-latest
    needs: cron-job
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: postgres backup
      - name: Test artifact download
        run: ls -R
    
  
      
